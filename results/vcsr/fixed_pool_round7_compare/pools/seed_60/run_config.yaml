experiment:
  name: vcsr_bestofk_round3_holdout_eval
  seed: 60
dataset:
  split: test
  split_strategy: template_hash
  domains:
  - blocksworld
  - gripper
  max_samples: 50
generation:
  backends:
  - type: openrouter
    K: 8
  temperature: 0.8
  top_p: 0.95
  K_values:
  - 1
  - 4
  - 8
  max_new_tokens: 1024
  retry_attempts: 3
  retry_delay_sec: 2
verifier:
  selection_metadata: results/verifier/best_current/selection.yaml
  scoring_batch_size: 8
evaluation:
  check_parse: true
  check_equivalence: true
  planner_filter: false
  policies:
  - greedy_first
  - random_parseable
  - verifier_ranked
output:
  dir: results\vcsr\fixed_pool_round7_compare\pools\seed_60
  save_predictions: true
