data:
  extra_train_jsonl: results/verifier/focused_round7/mined_examples.jsonl
  extra_train_repeat: 4
  filter_unparseable: true
  train_jsonl: results/neggen/pilot/verifier_train.relabeled.jsonl
  val_fraction: 0.15
evaluation:
  eval_steps: 0
  metrics:
  - auc
  - accuracy
  - f1
  - precision
  - recall
  per_domain: true
  per_source: true
experiment:
  name: verifier_focused_round7
  seed: 42
logging:
  log_every_n_steps: 1
  wandb_project: null
model:
  backbone: microsoft/deberta-v3-base
  dropout: 0.1
  init_selection_path: results/verifier/best_current/selection.yaml
  max_seq_len: 512
  revision: refs/pr/14
output:
  dir: results/verifier/focused_round7/dry_run_config_check
  save_best_model: true
  save_last_model: true
training:
  batch_size: 8
  dataloader_workers: 0
  early_stopping_metric: val_auc
  early_stopping_patience: 2
  epochs: 1
  fp16: true
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-05
  log_every_n_steps: 2
  max_grad_norm: 1.0
  objective: pointwise
  warmup_ratio: 0.05
  weight_decay: 0.01
