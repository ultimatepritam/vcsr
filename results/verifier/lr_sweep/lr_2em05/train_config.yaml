data:
  filter_unparseable: true
  train_jsonl: results/neggen/pilot/verifier_train.relabeled.jsonl
  val_fraction: 0.15
evaluation:
  eval_steps: 0
  metrics:
  - auc
  - accuracy
  - f1
  - precision
  - recall
  per_domain: true
  per_source: true
experiment:
  name: verifier_lr_2em05
  seed: 42
logging:
  log_every_n_steps: 1
  wandb_project: null
model:
  backbone: microsoft/deberta-v3-base
  dropout: 0.1
  max_seq_len: 512
  revision: refs/pr/14
output:
  dir: results\verifier\lr_sweep\lr_2em05
  save_best_model: true
  save_last_model: true
training:
  batch_size: 4
  dataloader_workers: 0
  early_stopping_metric: val_auc
  early_stopping_patience: 2
  epochs: 5
  fp16: true
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-05
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  weight_decay: 0.01
