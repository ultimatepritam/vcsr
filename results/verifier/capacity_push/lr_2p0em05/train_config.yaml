data:
  extra_train_jsonl: results/verifier/hardneg_round1/mined_examples.jsonl
  filter_unparseable: true
  train_jsonl: results/neggen/pilot/verifier_train.relabeled.jsonl
  val_fraction: 0.15
evaluation:
  eval_steps: 0
  metrics:
  - auc
  - accuracy
  - f1
  - precision
  - recall
  per_domain: true
  per_source: true
experiment:
  name: verifier_capacity_push_lr_2p0em05
  seed: 42
logging:
  log_every_n_steps: 1
  wandb_project: null
model:
  backbone: microsoft/deberta-v3-base
  dropout: 0.1
  max_seq_len: 512
  revision: refs/pr/14
output:
  dir: results\verifier\capacity_push\lr_2p0em05
  save_best_model: true
  save_last_model: true
training:
  batch_size: 8
  dataloader_workers: 0
  early_stopping_metric: val_auc
  early_stopping_patience: 3
  epochs: 12
  fp16: true
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-05
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  weight_decay: 0.01
