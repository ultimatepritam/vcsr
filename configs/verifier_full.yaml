experiment:
  name: verifier_full_run
  seed: 42

data:
  train_jsonl: results/neggen/pilot/verifier_train.relabeled.jsonl
  # Template-hash val hold-out from the JSONL rows (by planetarium_name group).
  # val_fraction is the fraction of unique template groups held out for val.
  val_fraction: 0.15
  # Only use parseable rows (label in {0, 1}).
  filter_unparseable: true

model:
  backbone: microsoft/deberta-v3-base
  # PR #14 provides safetensors (avoids torch >=2.6 requirement for .bin loading)
  revision: refs/pr/14
  max_seq_len: 512
  dropout: 0.1

training:
  learning_rate: 2.0e-5
  # batch_size x gradient_accumulation_steps = effective batch (4 x 16 = 64).
  # Reduce batch_size if VRAM < 8 GB; keep effective batch constant via accumulation.
  batch_size: 4
  gradient_accumulation_steps: 16
  epochs: 5
  early_stopping_patience: 2
  early_stopping_metric: val_auc
  weight_decay: 0.01
  warmup_ratio: 0.05
  fp16: true
  max_grad_norm: 1.0
  dataloader_workers: 0

evaluation:
  # Metrics computed every eval_steps; also at end of each epoch.
  eval_steps: 0
  metrics: [auc, accuracy, f1, precision, recall]
  per_source: true
  per_domain: true

output:
  dir: results/verifier/full_run
  save_best_model: true
  save_last_model: true

logging:
  wandb_project: null
  # Optimizer-step interval (not micro-batches). Use 1 to log every step; higher = quieter.
  log_every_n_steps: 1
