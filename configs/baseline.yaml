experiment:
  name: baseline_reproduction
  seed: 42

dataset:
  name: BatsResearch/planetarium
  split_strategy: template_hash
  split_ratios: [0.8, 0.1, 0.1]
  max_test_samples: 200  # small subset for initial validation

generation:
  model: null  # set to HF model id or API endpoint
  temperature: 0.8
  top_p: 0.95
  K: 1  # greedy baseline
  max_new_tokens: 1024
  prompt_template: default

evaluation:
  check_parse: true
  check_solvability: false  # requires Fast Downward
  check_equivalence: true
  planner_timeout_sec: 30

output:
  dir: results/baseline
  save_predictions: true
