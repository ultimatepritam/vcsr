# Post-paper robustness benchmark: prompt-only vs VCSR across OpenRouter models.
#
# This is intentionally separate from the frozen paper evidence under
# results/vcsr/final_repair_gate_round4. Do not use seeds 51-55 here.

base_config: configs/vcsr_bestofk_final_repair.yaml
output_dir: results/vcsr/model_benchmark

dataset:
  split: test
  domains:
    - blocksworld
    - gripper
  max_samples: 10

seeds:
  - 72
  - 73
  - 74

k_values:
  - 1
  - 4
  - 8

policies:
  - greedy_first
  - random_parseable
  - verifier_ranked
  - verifier_ranked_repair

verifier:
  selection_metadata: results/verifier/best_current/selection.yaml
  scoring_batch_size: 8

generation:
  backend_type: openrouter
  K: 8
  temperature: 0.8
  top_p: 0.95
  max_new_tokens: 1024
  retry_attempts: 3
  retry_delay_sec: 2
  clear_proxy_env: true

repair:
  enabled: true
  K: 8
  same_model_as_generation: true
  temperature: 0.2
  top_p: 0.9
  max_new_tokens: 1024
  retry_attempts: 3
  retry_delay_sec: 2

models:
  - name: claude_haiku_4p5
    model_id: anthropic/claude-haiku-4.5
  - name: claude_sonnet_4p5
    model_id: anthropic/claude-sonnet-4.5
  - name: claude_opus_4p6
    model_id: anthropic/claude-opus-4.6

execution:
  force: false
  continue_on_error: true

summary:
  main_k: 8
  prompt_policy: greedy_first
  random_policy: random_parseable
  verifier_policy: verifier_ranked
  repair_policy: verifier_ranked_repair
