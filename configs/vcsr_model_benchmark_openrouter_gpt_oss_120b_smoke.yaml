# Isolated smoke test for OpenRouter's hosted GPT-OSS 120B model.

base_config: configs/vcsr_bestofk_final_repair.yaml
output_dir: results/vcsr/model_benchmark_openrouter_gpt_oss_120b_smoke

dataset:
  split: test
  domains:
    - blocksworld
    - gripper
  max_samples: 3

seeds:
  - 72

k_values:
  - 1
  - 4
  - 8

policies:
  - greedy_first
  - random_parseable
  - verifier_ranked
  - verifier_ranked_repair

verifier:
  selection_metadata: results/verifier/best_current/selection.yaml
  scoring_batch_size: 8

generation:
  backend_type: openrouter
  K: 8
  temperature: 0.8
  top_p: 0.95
  max_new_tokens: 1024
  retry_attempts: 2
  retry_delay_sec: 1
  clear_proxy_env: true

repair:
  enabled: true
  K: 8
  same_model_as_generation: true
  temperature: 0.2
  top_p: 0.9
  max_new_tokens: 1024
  retry_attempts: 2
  retry_delay_sec: 1

models:
  - name: openrouter_gpt_oss_120b
    model_id: openai/gpt-oss-120b

execution:
  force: false
  continue_on_error: true

summary:
  main_k: 8
  prompt_policy: greedy_first
  random_policy: random_parseable
  verifier_policy: verifier_ranked
  repair_policy: verifier_ranked_repair
