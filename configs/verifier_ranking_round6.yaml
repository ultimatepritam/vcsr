experiment:
  name: verifier_ranking_round6
  seed: 42

data:
  train_jsonl: results/neggen/pilot/verifier_train.relabeled.jsonl
  extra_train_jsonl: results/verifier/ranking_round6/pointwise_extra.jsonl
  extra_train_repeat: 2
  pairwise_train_jsonl: results/verifier/ranking_round6/pairwise_train.jsonl
  pairwise_val_jsonl: results/verifier/ranking_round6/pairwise_dev.jsonl
  pairwise_val_fraction: 0.0
  val_fraction: 0.15
  filter_unparseable: true

model:
  backbone: microsoft/deberta-v3-base
  revision: refs/pr/14
  max_seq_len: 512
  dropout: 0.1
  init_selection_path: results/verifier/best_current/selection.yaml

training:
  objective: hybrid_pairwise
  pointwise_loss_weight: 1.0
  pairwise_loss_weight: 0.25
  learning_rate: 8.0e-6
  batch_size: 2
  gradient_accumulation_steps: 64
  epochs: 4
  early_stopping_patience: 2
  early_stopping_metric: val_auc
  weight_decay: 0.01
  warmup_ratio: 0.05
  fp16: true
  max_grad_norm: 1.0
  dataloader_workers: 0

evaluation:
  eval_steps: 0
  metrics: [auc, accuracy, f1, precision, recall, pairwise_accuracy, pairwise_mean_margin]
  per_source: true
  per_domain: true

output:
  dir: results/verifier/ranking_round6/retrain_from_round4_conservative_pairwise
  save_best_model: true
  save_last_model: true

logging:
  wandb_project: null
  log_every_n_steps: 1
